name: Refresh the calendar

on:
  schedule:
    - cron: '0 10 * * *'   # ~6am ET
    - cron: '0 22 * * *'   # ~6pm ET
  workflow_dispatch:
  # Any push to main deploys. Do NOT filter on paths here: this job is both the
  # data refresh AND the Pages deploy, so a paths filter silently strips
  # front-end-only changes (index.html, methodology.html) of any way to ship.
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: calendar
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build the calendar
        env:
          # Optional. Without it, Albany session days are simply absent and every
          # other source still works. See methodology.html.
          NYSENATE_API_KEY: ${{ secrets.NYSENATE_API_KEY }}
          SOCRATA_APP_TOKEN: ${{ secrets.SOCRATA_APP_TOKEN }}
        run: node build.mjs

      # A citation that 404s is a failed citation. This does not fail the build —
      # a dead link should not take the calendar down — but it puts the rot in the log.
      - name: Check cited sources for link rot
        run: node scripts/check-links.mjs || true

      - name: Commit if the calendar changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No change to the calendar."
          else
            git commit -m "Refresh the calendar: $(date -u +%Y-%m-%d)"
            git push
          fi

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - uses: actions/deploy-pages@v4
